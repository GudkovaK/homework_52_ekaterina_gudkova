{% extends 'webapp/base.html' %}
{% block content %}
<h4 class="mb-3">Удалить задачу?</h4>
<p>Вы уверены что хотите удалить задачу: <strong>{{ task.description }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'task_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
