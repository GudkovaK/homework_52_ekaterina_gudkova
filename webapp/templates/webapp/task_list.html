{% extends 'webapp/base.html' %}
{% block content %}
<a href="/tasks/add/" class="btn btn-primary mb-3">Добавить задачу</a>

{% if tasks %}
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Описание</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ task.description }}</td>
            <td>{{ task.get_status_display }}</td>
            <td>{{ task.due_date|default:"—" }}</td>
            <td>
                <a href="/tasks/{{ task.id }}/delete/" class="btn btn-danger btn-sm">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>Задач нет.</p>
{% endif %}
{% endblock %}
